<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico?">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <title>PDF Reader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #6b6b6b;
    }

    #toolbar {
      height: 46px;
      background: #2c2c2c;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 14px;
      flex-shrink: 0;
      border-bottom: 1px solid #111;
    }

    #toolbar a {
      color: #aaa;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 0.01em;
    }
    #toolbar a:hover { color: #fff; }

    #doc-title {
      flex: 1;
      font-size: 14px;
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #page-info { font-size: 13px; color: #888; white-space: nowrap; }

    #main { display: flex; flex: 1; overflow: hidden; }

    #toc-panel {
      width: 270px;
      background: #f7f7f7;
      border-right: 1px solid #d0d0d0;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    #toc-header {
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 700;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid #e0e0e0;
      background: #f0f0f0;
      flex-shrink: 0;
    }

    #toc-scroll { flex: 1; overflow-y: auto; padding: 6px 0; }

    #toc-empty {
      padding: 14px 16px;
      font-size: 13px;
      color: #aaa;
      font-style: italic;
    }

    .toc-item {
      display: block;
      padding: 5px 14px;
      font-size: 13px;
      color: #333;
      cursor: pointer;
      line-height: 1.45;
      border-left: 3px solid transparent;
      word-break: break-word;
    }
    .toc-item:hover { background: #e8e8e8; color: #000; }
    .toc-item.active { border-left-color: #002f87; background: #e6edf8; color: #002f87; }

    .toc-item[data-depth="1"] { padding-left: 14px; font-weight: 600; }
    .toc-item[data-depth="2"] { padding-left: 26px; }
    .toc-item[data-depth="3"] { padding-left: 38px; font-size: 12px; color: #555; }
    .toc-item[data-depth="4"] { padding-left: 50px; font-size: 12px; color: #777; }

    #pdf-container {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px;
      gap: 14px;
    }

    .page-wrapper {
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
      background: white;
      position: relative;
    }
    .page-wrapper canvas { display: block; }

    #status {
      color: #ddd;
      font-size: 15px;
      margin-top: 60px;
      text-align: center;
    }

    #status.file-error { line-height: 1.8; }
    #status.file-error a { color: #9cf; }

    #toc-list { list-style: none; display: none; }
  </style>
</head>
<body>

<div id="toolbar">
  <a href="notes.html" title="Back to Notes">
    <i class="fa-solid fa-arrow-left"></i> Notes
  </a>
  <span id="doc-title">Loading…</span>
  <span id="page-info"></span>
</div>

<div id="main">
  <div id="toc-panel">
    <div id="toc-header">Contents</div>
    <div id="toc-scroll">
      <div id="toc-empty">Loading…</div>
      <ul id="toc-list"></ul>
    </div>
  </div>

  <div id="pdf-container">
    <div id="status">Loading PDF…</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const params   = new URLSearchParams(window.location.search);
  const fileUrl  = params.get('file');
  const titleParam = params.get('title');

  const container   = document.getElementById('pdf-container');
  const pageInfo    = document.getElementById('page-info');
  const docTitle    = document.getElementById('doc-title');
  const tocEmpty    = document.getElementById('toc-empty');
  const tocList     = document.getElementById('toc-list');
  const statusEl    = document.getElementById('status');

  if (window.location.protocol === 'file:') {
    statusEl.classList.add('file-error');
    statusEl.innerHTML =
      'Cannot load PDFs when opened as a local file.<br>' +
      'Preview locally with a web server:<br><br>' +
      '<code>cd ' + window.location.pathname.replace(/\/[^/]+$/, '') + ' &amp;&amp; python3 -m http.server 8080</code><br><br>' +
      'Then open <a href="http://localhost:8080/notes.html">http://localhost:8080/notes.html</a>';
    docTitle.textContent = 'Local file detected';
  } else if (!fileUrl) {
    statusEl.textContent = 'No file specified.';
    docTitle.textContent = 'Error';
  } else {
    if (titleParam) {
      docTitle.textContent = titleParam;
      document.title = titleParam + ' — Notes';
    } else {
      const name = fileUrl.split('/').pop().replace('.pdf', '');
      docTitle.textContent = name;
      document.title = name + ' — Notes';
    }

    pdfjsLib.getDocument(fileUrl).promise.then(async (pdf) => {
      statusEl.remove();
      const numPages = pdf.numPages;
      const scale = 1.5;
      const pageWrappers = [];

      for (let i = 1; i <= numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale });

        const wrapper = document.createElement('div');
        wrapper.className = 'page-wrapper';
        wrapper.id = 'page-' + i;

        const canvas = document.createElement('canvas');
        canvas.width  = viewport.width;
        canvas.height = viewport.height;
        wrapper.appendChild(canvas);
        container.appendChild(wrapper);
        pageWrappers.push(wrapper);

        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
      }

      // Track current page
      const observer = new IntersectionObserver((entries) => {
        let top = numPages + 1;
        entries.forEach(e => {
          if (e.isIntersecting) {
            const n = parseInt(e.target.id.replace('page-', ''));
            if (n < top) top = n;
          }
        });
        if (top <= numPages) pageInfo.textContent = top + ' / ' + numPages;
      }, { root: container, threshold: 0.01 });

      pageWrappers.forEach(w => observer.observe(w));

      // Build TOC from PDF outline
      const outline = await pdf.getOutline();

      if (!outline || outline.length === 0) {
        tocEmpty.textContent = 'No table of contents.';
      } else {
        tocEmpty.style.display = 'none';
        tocList.style.display  = 'block';

        const tocItems = [];

        async function buildToc(items, depth) {
          for (const item of items) {
            const li = document.createElement('li');
            li.className = 'toc-item';
            li.dataset.depth = Math.min(depth, 4);
            li.textContent = item.title;

            li.addEventListener('click', async () => {
              tocItems.forEach(el => el.classList.remove('active'));
              li.classList.add('active');

              if (item.dest) {
                let dest = item.dest;
                if (typeof dest === 'string') dest = await pdf.getDestination(dest);
                if (dest) {
                  const pageIndex = await pdf.getPageIndex(dest[0]);
                  const target = document.getElementById('page-' + (pageIndex + 1));
                  if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
              }
            });

            tocList.appendChild(li);
            tocItems.push(li);

            if (item.items && item.items.length > 0) {
              await buildToc(item.items, depth + 1);
            }
          }
        }

        await buildToc(outline, 1);
      }

    }).catch(err => {
      statusEl.textContent = 'Error loading PDF: ' + err.message;
    });
  }
</script>

</body>
</html>
